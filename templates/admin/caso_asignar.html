{% extends "admin/layout_admin.html" %}

{% block title %}Asignar Caso - Panel Admin{% endblock %}

{% block main_content %}
<div class="max-w-2xl mx-auto space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Asignar caso {{ caso.case_id }}</h1>
        <p class="text-slate-500">Seleccione el médico responsable</p>
    </div>

    <form method="post" class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-2">Médico</label>
            <select name="medico_id" required class="w-full px-4 py-2 border border-slate-300 rounded-lg">
                <option value="">-- Seleccionar --</option>
                {% for medico in medicos %}
                <option value="{{ medico.id }}">Dr. {{ medico.nombre_completo }} ({{ medico.registro_medico }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-dark">Asignar</button>
            <a href="{% url 'administracion:portal_caso_detalle' caso.case_id %}" class="px-4 py-2 border border-slate-300 rounded-lg">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
