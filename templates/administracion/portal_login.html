{% extends 'base_modern.html' %}

{% block title %}Portal Administrador - Login{% endblock %}

{% block body %}
<main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary/10 to-blue-50 dark:from-primary/5 dark:to-slate-900 px-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center shadow-lg">
                <span class="material-icons-round text-white text-3xl">admin_panel_settings</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Portal Administrador</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Ingresa tus credenciales</p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-lg p-8">
            {% if messages %}
                {% for m in messages %}
                <div class="mb-4 p-4 rounded-xl 
                    {% if m.tags == 'success' %}bg-emerald-50 text-emerald-600 border border-emerald-200 dark:bg-emerald-900/20 dark:border-emerald-800
                    {% elif m.tags == 'error' %}bg-red-50 text-red-600 border border-red-200 dark:bg-red-900/20 dark:border-red-800
                    {% else %}bg-blue-50 text-blue-600 border border-blue-200 dark:bg-blue-900/20 dark:border-blue-800{% endif %}">
                    {{ m }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Correo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <span class="material-icons-round">email</span>
                        </span>
                        <input name="email" type="email" 
                               class="w-full pl-12 pr-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary" 
                               required />
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <span class="material-icons-round">lock</span>
                        </span>
                        <input name="password" type="password" 
                               class="w-full pl-12 pr-4 py-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-primary" 
                               required />
                    </div>
                </div>
                <button type="submit" class="w-full px-6 py-3 bg-primary hover:bg-primary-dark text-white rounded-xl font-semibold transition-all duration-200">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</main>
{% endblock %}
